name: Verify Human Identity

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ClawHub
        run: npm install -g clawhub

      - name: Link Human to Agent
        run: |
          node scripts/manualLinkHumanToAgent.js --challenge '{"name": "Rasyid3105", "description": "Rasyid3105 AI Agent"}'

      - name: Verify Human Identity
        run: echo "Human identity verification successful"
